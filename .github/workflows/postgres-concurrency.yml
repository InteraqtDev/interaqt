name: PostgreSQL Suites

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  postgres-suites:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: interaqt_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d interaqt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      INTERAQT_POSTGRES_DATABASE: interaqt_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      # r24 复盘教训：env-gated 的沉睡套件提供的置信度为零（F-1 存活 22 轮）。
      # CI 必须覆盖全部真实 PG 套件，而不只是 concurrency/scoped-sequence 两个。
      - run: npm run test:postgres
